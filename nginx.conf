# Nginx 配置文件
# 将此文件复制到 /etc/nginx/sites-available/ 目录下
# 然后创建软链接到 /etc/nginx/sites-enabled/ 目录

server {
    listen 80;
    server_name example.com; # 替换为您的域名

    root /var/www/citrusnode; # 替换为网站文件存放目录
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # 静态文件缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 日志配置
    access_log /var/log/nginx/citrusnode_access.log;
    error_log /var/log/nginx/citrusnode_error.log;
}
