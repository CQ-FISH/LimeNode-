<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - LimeNode 清柠云</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <i class="fas fa-lemon"></i>
      <h1>加入清柠云</h1>
      <p>创建您的账号，开启云端之旅</p>
    </div>

    <form class="form-ajax" action="/auth/register" method="POST">
      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-user me-2"></i>用户名
        </label>
        <input type="text" class="form-control" name="username" placeholder="请输入用户名 (3-20位)" required minlength="3" maxlength="20">
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-envelope me-2"></i>邮箱
        </label>
        <input type="email" class="form-control" name="email" placeholder="请输入邮箱地址" required>
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-phone me-2"></i>手机号
        </label>
        <input type="tel" class="form-control" name="phone" placeholder="请输入手机号 (选填)">
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-lock me-2"></i>密码
        </label>
        <input type="password" class="form-control" name="password" placeholder="请输入密码 (至少6位)" required minlength="6">
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-lock me-2"></i>确认密码
        </label>
        <input type="password" class="form-control" name="confirmPassword" placeholder="请再次输入密码" required>
      </div>

      <div class="mb-4">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="agreeTerms" name="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            我已阅读并同意 <a href="#" class="text-pink">《用户服务协议》</a> 和 <a href="#" class="text-pink">《隐私政策》</a>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        <i class="fas fa-user-plus me-2"></i>注 册
      </button>

      <div class="text-center">
        已有账号？ <a href="/auth/login" class="text-pink">立即登录</a>
      </div>
    </form>

    <div class="mt-4 pt-4 border-top text-center">
      <a href="/product/mall" class="text-secondary">
        <i class="fas fa-shopping-bag me-1"></i>先逛逛商城
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/main.js"></script>
</body>
</html>
