<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - LimeNode 清柠云</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <i class="fas fa-lemon"></i>
      <h1>LimeNode 清柠云</h1>
      <p>轻量、简约、二次元云服务控制台</p>
    </div>

    <form class="form-ajax" action="/auth/login" method="POST">
      <input type="hidden" name="redirect" value="{{redirect}}">

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-user me-2"></i>用户名
        </label>
        <input type="text" class="form-control" name="username" placeholder="请输入用户名" required>
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-lock me-2"></i>密码
        </label>
        <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
      </div>

      <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="remember" name="remember">
          <label class="form-check-label" for="remember">记住我</label>
        </div>
        <a href="#" class="text-pink">忘记密码？</a>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        <i class="fas fa-sign-in-alt me-2"></i>登 录
      </button>

      <div class="text-center">
        还没有账号？ <a href="/auth/register" class="text-pink">立即注册</a>
      </div>
    </form>

    <div class="mt-4 pt-4 border-top text-center">
      <p class="text-muted mb-2">
        <small>测试账号: admin / 123456</small>
      </p>
      <a href="/product/mall" class="text-secondary">
        <i class="fas fa-shopping-bag me-1"></i>先逛逛商城
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/main.js"></script>
</body>
</html>
